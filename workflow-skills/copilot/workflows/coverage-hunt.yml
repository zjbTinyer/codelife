name: Coverage Hunt — 覆盖率补全

on:
  workflow_dispatch:
    inputs:
      target:
        description: 目标覆盖率(%)
        required: false
        default: '80'
      generate_tests:
        description: 生成 JUnit 测试骨架
        type: boolean
        default: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java & Maven
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成 JaCoCo 报告
        run: mvn jacoco:report -q

      - name: 运行 Coverage Hunt
        run: |
          chmod +x ./skills/coverage-hunt.py
          ARGS="${{ inputs.target }}"
          [ "${{ inputs.generate_tests }}" = "true" ] && ARGS="$ARGS --generate-tests --dry-run"
          ./skills/coverage-hunt.py $ARGS

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/target/site/jacoco/'
