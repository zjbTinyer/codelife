name: Jenkins Debug — 构建日志分析

on:
  workflow_dispatch:
    inputs:
      job_name:
        description: Jenkins Job 名称
        required: true
      build_num:
        description: Build 号 (默认 lastBuild)
        required: false
        default: 'lastBuild'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 运行 Jenkins Debug
        env:
          JENKINS_URL: ${{ vars.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |
          chmod +x ./skills/jenkins-debug.sh
          ./skills/jenkins-debug.sh \
            --job "${{ inputs.job_name }}" \
            --build "${{ inputs.build_num }}" \
            --url "$JENKINS_URL"

      - name: 上传分析报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-debug-report
          path: '/tmp/jenkins-debug-*.json'
